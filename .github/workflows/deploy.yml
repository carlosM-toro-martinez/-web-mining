name: API CI/CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Obtener código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Preparar Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build + Push imagen
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/marte-api:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/marte-api:latest

      # 5. Deploy en VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/systems/marte-mining/api-mining

            echo "📦 Deploy version: ${{ github.sha }}"

            export VERSION=${{ github.sha }}

            # Descargar nueva imagen
            docker compose pull api

            # Levantar contenedor actualizado
            docker compose up -d api

            # Esperar a que levante
            sleep 5

            # Ejecutar migraciones (IMPORTANTE)
            docker compose exec api npx prisma migrate deploy

            echo "Deploy finalizado"
